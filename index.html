<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mi Modelo 3D con AR</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        body { 
            margin: 0; 
            min-height: 100vh;
        }
        model-viewer { 
            width: 100%; 
            min-height: 100vh; 
            background-color: #111;
            display: block;
        }
    </style>
</head>
<body>
    <model-viewer 
        id="mv-demo"
        src="realistic_human_heart.glb"
        alt="Modelo anatómico 3D"
        ar
        ar-modes="webxr scene-viewer quick-look"
        ar-scale="auto"
        camera-controls
        auto-rotate
        shadow-intensity="1"
        environment-image="neutral"
        style="width: 100%; min-height: 100vh;">
        
        <!-- 👇 Este es el botón que añadiste. Debería aparecer flotando abajo. -->
        <button slot="ar-button" style="
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #ffffff;
            color: #000000;
            border: none;
            border-radius: 40px;
            padding: 12px 24px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 100;
        ">
            📱 Ver en Realidad Aumentada
        </button>
    </model-viewer>
</body>
</html>
