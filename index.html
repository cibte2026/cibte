<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mi Modelo 3D con AR</title>
    <style>
        /* Elimina todos los márgenes y desbordes de la página */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* El cuerpo ocupa toda la altura de la pantalla */
        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Evita el scroll en la página */
            position: fixed;  /* Ayuda a mantener el contexto en móviles */
        }

        /* El visor es el rey y ocupa TODO el espacio disponible sin márgenes */
        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #111;
            /* Este es un truco para asegurar que el visor no se corte por la barra de direcciones del móvil */
            min-height: -webkit-fill-available;
        }
    </style>
</head>
<body>
    <!-- 
        He añadido 'touch-action="pan-y"' para mejorar la interacción táctil en móviles.
        Esto permite hacer scroll vertical fuera del modelo y rotar el modelo dentro de él.
    -->
    <model-viewer 
        src="realistic_human_heart.glb"
        ar
        ar-modes="webxr scene-viewer quick-look"
        camera-controls
        auto-rotate
        touch-action="pan-y"
        style="width:100%; height:100%;">
    </model-viewer>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
</body>
</html>
