<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mi Modelo 3D con AR - Model Viewer</title>
    
    <!-- Cargar la librería Model-Viewer desde CDN oficial -->
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <script nomodule src="https://unpkg.com/@google/model-viewer/dist/model-viewer-legacy.js"></script>
    
    <style>
        /* CSS que garantiza que el visor ocupe toda la pantalla */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
        }
        
        model-viewer {
            width: 100%;
            height: 100%;
            background-color: #111;
        }
    </style>
</head>
<body>
    <!-- 
        Etiqueta estándar de Model-Viewer según documentación oficial.
        Atributos mínimos necesarios para que funcione AR y controles:
        - src: ruta a tu modelo GLB
        - ar: habilita la realidad aumentada
        - camera-controls: habilita los controles de cámara (zoom, rotación)
        - auto-rotate: rotación automática del modelo
    -->
    <model-viewer 
        src="realistic_human_heart.glb"
        alt="Modelo anatómico 3D"
        ar
        ar-modes="webxr scene-viewer quick-look"
        camera-controls
        auto-rotate
        touch-action="pan-y"
        style="width:100%; height:100%;">
    </model-viewer>
</body>
</html>
